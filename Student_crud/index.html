<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="stylesheet" href="./bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
    <title>Student Crud</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <h1 id="mainHead">Student Crud</h1>

    <div class="containerDiv">

        <div class="formDiv">
            <form id="infoForm">
                <div class="row">
                    <input type="hidden" id="editIndex">
                    <div class="col"><input type="text" class="info form-control" name="studentName" id="name"
                            placeholder="Enter Student Name"></div>
                    <div class="col"><input type="number" class="info form-control" name="studentage" placeholder="Enter Age"></div>
                </div>
                <div class="row mt-5">
                    <div class="col"><input type="number" class="info form-control" name="studentMarks" placeholder="Enter Marks">
                    </div>

                    <div class="col "><button id="saveBtn" class="btn  btn-primary" type="submit">Save</button></div>
                </div>
                <br><br>

            </form>
        </div>

        <div class="tableDiv rounded-2">
            <div class="row tablerow py-1 rounded-2">
                <div class="col-2 text-center fs-5 fw-bold">Name</div>
                <div class="col-2 text-center fs-5 fw-bold">Age</div>
                <div class="col-2 text-center fs-5 fw-bold">Marks</div>
                <div class="col-3 text-center fs-5 fw-bold">Percentage</div>
                <div class="col text-center fs-5 fw-bold"></div>
                <div class="col text-center fs-5 fw-bold"></div>
                <div class="col text-center fs-5 fw-bold"></div>
            </div>
            <div id="pre" class="row datarow d-none mt-2 bg-info d-flex align-items-center rounded-2 py-2 dataRow">
                <div class="col-2  text-center fw-bold"></div>
                <div class="col-2  text-center fw-bold"></div>
                <div class="col-2  text-center fw-bold"></div>
                <div class="col-3  text-center fw-bold"></div>
                <div class="col ">
                    <button class="BTN clone"><i class="fa-regular fa-clone "></i></button>
                </div>
                <div class="col">
                    <button class="BTN edit" data-index="${index}" data-bs-toggle="modal"
                        data-bs-target="#exampleModal">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                </div>
                <div class="col">
                    <button class="BTN delete"><i class="fa-solid fa-trash"></i></button>
                </div>

            </div>

        </div>
    </div>

    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Edit Student Info</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="modal-body">
                        <label for="editName" class="fw-bold">Name</label>

                        <input type="text" id="editName" class="form-control mb-3" placeholder="Student Name">

                        <label for="editAge" class="fw-bold">Age</label>
                        <input type="number" id="editAge" class="form-control mb-3" placeholder="Age">

                        <label for="editMarks" class="fw-bold">Marks</label>

                        <input type="number" id="editMarks" class="form-control" placeholder="Marks">

                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="updateStudent" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>









    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
        integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
        crossorigin="anonymous"></script>
    <script src="./bootstrap.js"></script>

    <script src="./script.js"></script>
</body>

</html>
