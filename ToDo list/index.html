<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>ToDo List</title>
</head>

<body>

    <div id="formcontainer" class="container mt-4 rounded-3  border">
        <div class="container formdiv  p-4   border-bottom border-2 border-grey">
            <h3 class="mb-4 text-center">ToDo List <i class="fa-solid fa-list"></i></h3>
            <form id="toDoForm" class="d-flex align-items-center   ">
                <div class="inputdiv">
                    <input type="text" name="taskInput" placeholder="Add your task" id="taskVal">
                    <button id="addBtn" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div>
        <div class="container formdiv p-4 listdiv">
            <h4>My Task List</h4>
            <ul id="taskList" class="list-group  ">
                <li
                    class="taskItem  list-group-item p-2 mt-2 fs-5 rounded-3 d-flex justify-content-between align-items-center">

                    <div class="d-flex align-items-center gap-2">
                        <button id="tickBtn" class="check-btn"></button>
                        <span class="task-text">Enter Task</span>
                    </div>

                    <a href="#" class="delete btn" onclick="deleteTask(this,0)"><i class="fa-solid fa-trash"></i></a>

                </li>

            </ul>

        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="./bootstrap.js"></script>
    <script src="./script.js"></script>
</body>

</html>
